name: Apartment Monitor

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:          # also allow manual trigger from the Actions tab
  push:
    branches: [main]
    paths: [monitor.py]       # re-run on script changes for quick testing

# Allow the workflow to commit the updated seen.json back to the repo
permissions:
  contents: write

# If a run is still going when the next one starts, just let it finish.
concurrency:
  group: apartment-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          NTFY_TOPIC:       ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER:      ${{ secrets.NTFY_SERVER }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen.json
          if git diff --cached --quiet; then
            echo "No changes to seen.json"
          else
            git commit -m "chore: update seen listings [skip ci]"
            git push
          fi
